<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixter — Flujo de Pagos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0F0F0F;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex; align-items: flex-start; justify-content: center;
      min-height: 100vh; padding: 86px 24px 40px;
    }
    input, textarea { outline: none; }
    button { cursor: pointer; }
    button:active { opacity: 0.75; }
    ::-webkit-scrollbar { display: none; }
  </style>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#0F0F0F"/>
      <rect x="43" y="6" width="34" height="68" rx="5" fill="#1C1C1C" stroke="#333" stroke-width="1"/>
      <rect x="47" y="14" width="26" height="42" rx="2" fill="#FF6B2B" opacity="0.15"/>
      <text x="60" y="41" font-family="sans-serif" font-weight="800" font-size="16" fill="#FF6B2B" text-anchor="middle">F</text>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">

    /* ── Tokens ─────────────────────────────────────────────── */
    const T = {
      orange: '#FF6B2B', black: '#0F0F0F',
      gray50: '#FAFAFA', gray100: '#F3F4F6', gray200: '#E5E7EB',
      gray400: '#9CA3AF', gray500: '#6B7280',
      green: '#059669', red: '#DC2626',
    };

    /* ── Icons ──────────────────────────────────────────────── */
    const Ic = {
      phone:       ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2.5"/><circle cx="12" cy="17.5" r=".9" fill={c} stroke="none"/></svg>,
      lock:        ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      shield:      ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
      truck:       ({s=18,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
      box:         ({s=32,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/></svg>,
      warn:        ({s=15,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
      checkCircle: ({s=32,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      card:        ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
      alertCircle: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      ban:         ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>,
      bank:        ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg>,
      star:        ({s=12,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={c} stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
      camera:      ({s=24,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
      tag:         ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>,
    };

    /* ── Primitives ──────────────────────────────────────────── */
    const ScreenWrap = ({ bg='#F7F7F7', children }) => (
      <div style={{ background: bg, minHeight: '100%', paddingBottom: 28 }}>{children}</div>
    );

    function TopBar({ title, onBack, left, right }) {
      return (
        <div style={{
          height: 52, display: 'flex', alignItems: 'center', gap: 8,
          padding: '0 16px', background: '#fff',
          borderBottom: `1px solid ${T.gray200}`,
          position: 'sticky', top: 0, zIndex: 9,
        }}>
          <div style={{ width: 32, flexShrink: 0, display: 'flex', alignItems: 'center' }}>
            {onBack
              ? <button onClick={onBack} style={{ background: 'none', border: 'none', fontSize: 26, lineHeight: 1, color: T.black, padding: 0, fontFamily: 'inherit', display: 'flex', alignItems: 'center' }}>‹</button>
              : left}
          </div>
          <div style={{ flex: 1, textAlign: 'center', fontSize: 16, fontWeight: 700, color: T.black, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{title}</div>
          <div style={{ width: 32, flexShrink: 0, display: 'flex', justifyContent: 'flex-end', alignItems: 'center' }}>{right}</div>
        </div>
      );
    }

    const Pill = ({ children, color=T.orange }) => (
      <span style={{ display: 'inline-block', fontSize: 11, fontWeight: 700, background: color+'18', color, padding: '3px 10px', borderRadius: 20 }}>{children}</span>
    );

    const Card = ({ children, style: sx={} }) => (
      <div style={{ background: '#fff', borderRadius: 16, border: `1px solid ${T.gray200}`, padding: 16, ...sx }}>{children}</div>
    );

    const BtnPrimary = ({ label, onClick, style: sx={} }) => (
      <button onClick={onClick} style={{ width: '100%', padding: 16, borderRadius: 14, background: T.black, color: '#fff', border: 'none', fontSize: 16, fontWeight: 700, fontFamily: 'inherit', transition: 'opacity .15s', ...sx }}>{label}</button>
    );

    const BtnOutline = ({ label, onClick, color=T.black, style: sx={} }) => (
      <button onClick={onClick} style={{ width: '100%', padding: '14px 16px', borderRadius: 14, background: '#fff', color, border: `1.5px solid ${T.gray200}`, fontSize: 15, fontWeight: 600, fontFamily: 'inherit', ...sx }}>{label}</button>
    );

    const BtnGhost = ({ label, onClick, color=T.gray500 }) => (
      <button onClick={onClick} style={{ width: '100%', background: 'none', border: 'none', color, fontSize: 13, fontWeight: 600, fontFamily: 'inherit', padding: '10px 0', textAlign: 'center' }}>{label}</button>
    );

    const Row = ({ label, value, accent }) => (
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '7px 0', borderBottom: `1px solid ${T.gray100}`, fontSize: 13 }}>
        <span style={{ color: T.gray500 }}>{label}</span>
        <span style={{ fontWeight: accent ? 700 : 500, color: accent ? T.orange : T.black }}>{value}</span>
      </div>
    );

    function ProductCard({ compact }) {
      const sz = compact ? 50 : 64;
      return (
        <Card style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
          <div style={{ width: sz, height: sz, borderRadius: 12, background: T.gray100, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Ic.phone s={compact ? 22 : 28} c={T.gray400} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: compact ? 13 : 14, fontWeight: 700, color: T.black }}>Pantalla LCD iPhone 13 Pro</div>
            <div style={{ fontSize: 12, color: T.gray400, marginTop: 3, display: 'flex', alignItems: 'center', gap: 4 }}>
              @carlos_fix · <Ic.star s={11} c="#F59E0B" /> 4.9
            </div>
            {!compact && <div style={{ fontSize: 17, fontWeight: 800, color: T.black, marginTop: 5 }}>€89,99</div>}
          </div>
          {compact && <div style={{ fontSize: 15, fontWeight: 800, color: T.black, flexShrink: 0 }}>€89,99</div>}
        </Card>
      );
    }

    /* ═══ SCREEN 1 — CHECKOUT ═══════════════════════════════════ */
    function CheckoutScreen({ onSuccess, onFail }) {
      const [card,setCard]=React.useState(''), [exp,setExp]=React.useState(''), [cvv,setCvv]=React.useState(''), [name,setName]=React.useState(''), [focus,setFocus]=React.useState('');
      const fmtCard = v => v.replace(/\D/g,'').slice(0,16).replace(/(\d{4})(?=\d)/g,'$1 ');
      const fmtExp  = v => { const d=v.replace(/\D/g,'').slice(0,4); return d.length>2 ? d.slice(0,2)+'/'+d.slice(2) : d; };
      const inp = f => ({ width:'100%', padding:'12px 13px', borderRadius:11, fontFamily:'inherit', border:`1.5px solid ${focus===f?T.orange:T.gray200}`, fontSize:14, color:T.black, background:T.gray50, transition:'border-color .15s' });
      const lbl = { display:'block', fontSize:11, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:T.gray400, marginBottom:6 };
      const price=89.99, commission=+(89.99*0.08).toFixed(2), ship=3.99;
      const total=(price+commission+ship).toFixed(2).replace('.',',');
      const f = n => n.toFixed(2).replace('.',',');
      return (
        <ScreenWrap>
          <TopBar title="Pago seguro" right={<div style={{ width:28,height:28,borderRadius:8,background:T.gray100,display:'flex',alignItems:'center',justifyContent:'center' }}><Ic.lock s={14} c={T.gray500}/></div>} />
          <div style={{ padding:'14px 14px 0', display:'flex', flexDirection:'column', gap:10 }}>
            <ProductCard />
            <Card>
              <div style={{ fontSize:13,fontWeight:700,color:T.black,marginBottom:10 }}>Resumen del pedido</div>
              <Row label="Precio artículo" value={`€${f(price)}`} />
              <Row label="Comisión Fixter (8%)" value={`€${f(commission)}`} accent />
              <Row label="Envío estimado" value={`€${f(ship)}`} />
              <div style={{ display:'flex',justifyContent:'space-between',paddingTop:10 }}>
                <span style={{ fontWeight:700,fontSize:15 }}>Total</span>
                <span style={{ fontWeight:800,fontSize:18 }}>€{total}</span>
              </div>
            </Card>
            <Card>
              <div style={{ fontSize:13,fontWeight:700,color:T.black,marginBottom:14 }}>Datos de tarjeta</div>
              <div style={{ marginBottom:12 }}>
                <label style={lbl}>Número de tarjeta</label>
                <div style={{ position:'relative' }}>
                  <input value={card} placeholder="1234 5678 9012 3456" onChange={e=>setCard(fmtCard(e.target.value))} onFocus={()=>setFocus('card')} onBlur={()=>setFocus('')} style={{ ...inp('card'), paddingRight:42 }} />
                  <span style={{ position:'absolute',right:12,top:'50%',transform:'translateY(-50%)' }}><Ic.card s={17} c={T.gray400}/></span>
                </div>
              </div>
              <div style={{ display:'flex',gap:10,marginBottom:12 }}>
                <div style={{ flex:1 }}><label style={lbl}>Vencimiento</label><input value={exp} placeholder="MM/AA" onChange={e=>setExp(fmtExp(e.target.value))} onFocus={()=>setFocus('exp')} onBlur={()=>setFocus('')} style={inp('exp')} /></div>
                <div style={{ flex:1 }}><label style={lbl}>CVV</label><input value={cvv} placeholder="•••" type="password" onChange={e=>setCvv(e.target.value.replace(/\D/g,'').slice(0,4))} onFocus={()=>setFocus('cvv')} onBlur={()=>setFocus('')} style={inp('cvv')} /></div>
              </div>
              <div><label style={lbl}>Titular</label><input value={name} placeholder="Nombre completo" onChange={e=>setName(e.target.value)} onFocus={()=>setFocus('name')} onBlur={()=>setFocus('')} style={inp('name')} /></div>
            </Card>
          </div>
          <div style={{ padding:'12px 14px', display:'flex', flexDirection:'column', gap:8 }}>
            <BtnPrimary label={`Pagar €${total}`} onClick={onSuccess} />
            <BtnOutline label="Simular pago fallido →" onClick={onFail} color={T.gray400} />
            <div style={{ display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginTop:2 }}>
              <Ic.lock s={11} c={T.gray400}/>
              <p style={{ fontSize:11,color:T.gray400,lineHeight:1.6 }}>Pago cifrado SSL · Importe retenido hasta confirmar la recepción</p>
            </div>
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ SCREEN 2 — CONFIRMACIÓN EXITOSA ═══════════════════════ */
    function SuccessScreen({ onTrack }) {
      return (
        <ScreenWrap bg="#fff">
          <TopBar title="Confirmación" />
          <div style={{ padding:'28px 20px 20px', textAlign:'center' }}>
            <div style={{ width:78,height:78,borderRadius:'50%',background:T.orange,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px' }}>
              <svg width="34" height="26" viewBox="0 0 34 26" fill="none"><path d="M2 13L12 23L32 3" stroke="white" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <h1 style={{ fontSize:24,fontWeight:800,color:T.black,marginBottom:6 }}>¡Pago realizado!</h1>
            <p style={{ fontSize:14,color:T.gray500,lineHeight:1.65 }}>Tu pedido está confirmado. El importe queda retenido hasta que lo recibas.</p>
          </div>
          <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:10 }}>
            <Card>
              {[['Nº de pedido','#FX-2847'],['Artículo','Pantalla LCD iPhone 13 Pro'],['Vendedor','@carlos_fix'],['Total pagado','€101,18']].map(([k,v],i,a) => (
                <div key={k} style={{ display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<a.length-1?`1px solid ${T.gray100}`:'none',fontSize:13 }}>
                  <span style={{ color:T.gray500 }}>{k}</span><span style={{ fontWeight:700,color:T.black }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop:12,padding:'10px 12px',borderRadius:10,background:T.orange+'12',display:'flex',gap:10,alignItems:'center' }}>
                <Ic.shield s={16} c={T.orange}/>
                <span style={{ fontSize:12,color:'#7A3000',fontWeight:600,lineHeight:1.5 }}>€89,99 retenidos en escrow hasta que confirmes la recepción</span>
              </div>
            </Card>
            <BtnPrimary label="Ver seguimiento del pedido" onClick={onTrack} />
            <BtnOutline label="Seguir comprando" onClick={()=>{}} />
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ SCREEN 3 — SEGUIMIENTO ════════════════════════════════ */
    const STEPS = [
      { label:'Pedido confirmado',       sub:'Hoy, 10:23h',                            done:true },
      { label:'Pago retenido en escrow', sub:'Hoy, 10:23h · Fixter protege tu compra', done:true },
      { label:'En preparación',          sub:'Vendedor empaquetando el artículo',       done:true },
      { label:'En tránsito',             sub:'ES123456789MX · Correos Express',         active:true },
      { label:'Entregado',               sub:'Estimado: jueves 6 de junio',             done:false },
    ];
    function TrackingScreen({ onReceive, onBack }) {
      const [copied,setCopied]=React.useState(false);
      return (
        <ScreenWrap>
          <TopBar title="Seguimiento" onBack={onBack} />
          <div style={{ padding:'14px 14px 0', display:'flex', flexDirection:'column', gap:10 }}>
            <Card style={{ display:'flex',gap:12,alignItems:'center' }}>
              <div style={{ width:52,height:52,borderRadius:10,background:T.gray100,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center' }}><Ic.phone s={22} c={T.gray400}/></div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:11,color:T.gray400,marginBottom:2 }}>Pedido #FX-2847</div>
                <div style={{ fontSize:14,fontWeight:700,color:T.black }}>Pantalla LCD iPhone 13 Pro</div>
                <div style={{ marginTop:6 }}><Pill>En tránsito</Pill></div>
              </div>
            </Card>
            <Card>
              <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase',color:T.gray400,marginBottom:8 }}>Nº seguimiento (añadido por el vendedor)</div>
              <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center' }}>
                <div>
                  <div style={{ fontSize:18,fontWeight:800,fontFamily:'monospace',letterSpacing:1.5,color:T.black }}>ES123456789MX</div>
                  <div style={{ fontSize:12,color:T.gray400,marginTop:3 }}>Correos Express</div>
                </div>
                <button onClick={()=>{setCopied(true);setTimeout(()=>setCopied(false),1500)}} style={{ background:copied?T.orange+'18':T.gray100,border:'none',borderRadius:8,padding:'8px 14px',fontSize:12,fontWeight:700,fontFamily:'inherit',color:copied?T.orange:T.black,transition:'all .2s' }}>{copied?'✓ Copiado':'Copiar'}</button>
              </div>
            </Card>
            <Card>
              <div style={{ fontSize:13,fontWeight:700,color:T.black,marginBottom:14 }}>Estado del envío</div>
              {STEPS.map((step,i) => (
                <div key={i} style={{ display:'flex',gap:12 }}>
                  <div style={{ display:'flex',flexDirection:'column',alignItems:'center',width:20,flexShrink:0 }}>
                    <div style={{ width:20,height:20,borderRadius:'50%',flexShrink:0,background:step.done?T.black:step.active?T.orange:T.gray200,display:'flex',alignItems:'center',justifyContent:'center' }}>
                      {step.done && <span style={{ fontSize:9,color:'#fff',fontWeight:900 }}>✓</span>}
                      {step.active && <div style={{ width:8,height:8,borderRadius:'50%',background:'#fff' }} />}
                    </div>
                    {i<STEPS.length-1 && <div style={{ width:2,flex:1,minHeight:22,margin:'2px 0',background:step.done?T.black:T.gray200 }} />}
                  </div>
                  <div style={{ paddingBottom:i<STEPS.length-1?14:0,flex:1 }}>
                    <div style={{ fontSize:13,fontWeight:step.active?700:600,color:step.active?T.orange:step.done?T.black:T.gray400 }}>{step.label}</div>
                    <div style={{ fontSize:11,color:T.gray400,marginTop:2,lineHeight:1.4 }}>{step.sub}</div>
                  </div>
                </div>
              ))}
            </Card>
            <div style={{ background:T.orange+'14',borderRadius:12,padding:'12px 14px',display:'flex',gap:10,alignItems:'center' }}>
              <Ic.truck s={18} c={T.orange}/><span style={{ fontSize:13,fontWeight:600,color:'#7A3000' }}>Entrega estimada: jueves 6 de junio</span>
            </div>
            <BtnPrimary label="He recibido el pedido" onClick={onReceive} />
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ SCREEN 4 — CONFIRMAR RECEPCIÓN ════════════════════════ */
    function ReceiveScreen({ onConfirm, onBack, onProblem }) {
      const [state,setState]=React.useState('idle');
      const confirm = () => { setState('loading'); setTimeout(()=>{setState('done');setTimeout(onConfirm,1000);},1200); };
      return (
        <ScreenWrap bg="#fff">
          <TopBar title="Confirmar recepción" onBack={state==='idle'?onBack:undefined} />
          <div style={{ padding:'28px 20px 16px',textAlign:'center' }}>
            <div style={{ width:72,height:72,borderRadius:'50%',background:state==='done'?T.green+'18':T.gray100,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',transition:'background .3s' }}>
              {state==='done' ? <Ic.checkCircle s={34} c={T.green}/> : <Ic.box s={32} c={T.gray400}/>}
            </div>
            <h2 style={{ fontSize:21,fontWeight:800,color:T.black,marginBottom:7 }}>{state==='done'?'¡Pago liberado!':'¿Has recibido tu pedido?'}</h2>
            <p style={{ fontSize:13,color:T.gray500,lineHeight:1.6 }}>{state==='done'?'€89,99 han sido transferidos a @carlos_fix':'Revisa que el artículo esté en buen estado antes de confirmar.'}</p>
          </div>
          <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:10 }}>
            <ProductCard compact />
            {state==='idle' && (
              <div style={{ background:'#FFFBF5',border:`1px solid #FFD9B3`,borderRadius:12,padding:'12px 14px',display:'flex',gap:10,alignItems:'flex-start' }}>
                <div style={{ flexShrink:0,marginTop:1 }}><Ic.warn s={15} c="#D97706"/></div>
                <p style={{ fontSize:12,color:'#7C3D0F',lineHeight:1.55,margin:0 }}>Al confirmar, <strong>€89,99 se liberarán al vendedor</strong>. Solo confirma si el artículo está en perfectas condiciones.</p>
              </div>
            )}
            {state==='done' && (
              <div style={{ display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:16,background:'#F0FFF8',borderRadius:14,border:`1px solid #A7F3D0` }}>
                <Ic.checkCircle s={20} c={T.green}/>
                <span style={{ fontWeight:700,color:T.green,fontSize:15 }}>Transacción completada con éxito</span>
              </div>
            )}
            {state==='idle' && <><BtnPrimary label="He recibido el pedido" onClick={confirm} /><BtnGhost label="Hay un problema con mi pedido" onClick={onProblem} color={T.red} /></>}
            {state==='loading' && <div style={{ padding:18,textAlign:'center',fontSize:13,color:T.gray400,fontWeight:600 }}>Procesando…</div>}
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ SCREEN 5 — PAGO FALLIDO ═══════════════════════════════ */
    const CAUSES = [
      {icon:'card',        label:'Fondos insuficientes en la tarjeta'},
      {icon:'alertCircle', label:'Número de tarjeta o CVV incorrectos'},
      {icon:'ban',         label:'Tarjeta bloqueada o caducada'},
      {icon:'bank',        label:'Límite de pago online superado'},
    ];
    function FailedScreen({ onRetry, onBack }) {
      return (
        <ScreenWrap bg="#fff">
          <TopBar title="Error de pago" onBack={onBack} />
          <div style={{ padding:'28px 20px 16px',textAlign:'center' }}>
            <div style={{ width:72,height:72,borderRadius:'50%',background:'#FEE2E2',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px' }}>
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M4 4L24 24M24 4L4 24" stroke={T.red} strokeWidth="3.5" strokeLinecap="round"/></svg>
            </div>
            <h2 style={{ fontSize:22,fontWeight:800,color:T.black,marginBottom:6 }}>Pago fallido</h2>
            <p style={{ fontSize:14,color:T.gray500,marginBottom:8 }}>No hemos podido procesar tu pago.</p>
            <code style={{ display:'inline-block',fontSize:11,background:T.gray100,color:T.gray500,padding:'4px 12px',borderRadius:20,letterSpacing:'0.04em' }}>CARD_DECLINED</code>
          </div>
          <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:10 }}>
            <Card>
              <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:T.gray400,marginBottom:10 }}>Posibles causas</div>
              {CAUSES.map(({icon,label}) => { const Icon=Ic[icon]; return (
                <div key={label} style={{ display:'flex',gap:10,alignItems:'center',padding:'6px 0',fontSize:13,color:T.gray500 }}>
                  <div style={{ flexShrink:0 }}><Icon s={15} c={T.gray400}/></div><span>{label}</span>
                </div>
              );})}
            </Card>
            <ProductCard compact />
            <BtnPrimary label="Reintentar pago" onClick={onRetry} />
            <BtnOutline label="Usar otro método de pago" onClick={()=>{}} />
            <BtnGhost label="Contactar soporte" />
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ SCREEN 6 — SELECCIÓN DE PROBLEMA ══════════════════════ */
    const PROBLEM_TYPES = [
      { id:'not-received', label:'No he recibido el artículo',             icon:'truck' },
      { id:'damaged',      label:'El artículo está dañado o defectuoso',   icon:'warn' },
      { id:'wrong-item',   label:'El artículo no coincide con la descripción', icon:'tag' },
      { id:'incorrect',    label:'Me han enviado el artículo incorrecto',   icon:'alertCircle' },
      { id:'incomplete',   label:'Falta contenido en el paquete',           icon:'box' },
      { id:'other',        label:'Otro problema',                           icon:'alertCircle' },
    ];
    function ProblemTypeScreen({ onNext, onBack }) {
      const [selected,setSelected]=React.useState('');
      return (
        <ScreenWrap bg="#fff">
          <TopBar title="Abrir reclamación" onBack={onBack} />
          <div style={{ padding:'20px 16px', display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <h2 style={{ fontSize:18,fontWeight:800,color:T.black,marginBottom:6 }}>¿Qué ha ocurrido?</h2>
              <p style={{ fontSize:13,color:T.gray500,lineHeight:1.6 }}>Selecciona el motivo para continuar con la reclamación.</p>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {PROBLEM_TYPES.map(pt => {
                const Icon = Ic[pt.icon];
                const active = selected===pt.id;
                return (
                  <button key={pt.id} onClick={()=>setSelected(pt.id)} style={{ display:'flex',alignItems:'center',gap:12,padding:'13px 14px',borderRadius:12,border:`1.5px solid ${active?T.orange:T.gray200}`,background:active?T.orange+'08':'#fff',cursor:'pointer',textAlign:'left',fontFamily:'inherit',transition:'all .15s' }}>
                    <div style={{ width:34,height:34,borderRadius:10,background:active?T.orange+'18':T.gray100,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center' }}>
                      <Icon s={16} c={active?T.orange:T.gray400}/>
                    </div>
                    <span style={{ fontSize:14,fontWeight:active?700:500,color:active?T.orange:T.black,flex:1 }}>{pt.label}</span>
                    <div style={{ width:18,height:18,borderRadius:'50%',border:`2px solid ${active?T.orange:T.gray200}`,background:active?T.orange:'#fff',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center' }}>
                      {active && <div style={{ width:6,height:6,borderRadius:'50%',background:'#fff' }} />}
                    </div>
                  </button>
                );
              })}
            </div>
            <BtnPrimary label="Continuar" onClick={()=>selected&&onNext(selected)} style={{ opacity:selected?1:0.35 }} />
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ SCREEN 7 — FORMULARIO DE RECLAMACIÓN ══════════════════ */
    function ProblemFormScreen({ problemType, onSend, onBack }) {
      const [desc,setDesc]=React.useState(''), [hasPhoto,setHasPhoto]=React.useState(false);
      const typeLabel = PROBLEM_TYPES.find(p=>p.id===problemType)?.label||'';
      const canSend = desc.trim().length > 10;
      return (
        <ScreenWrap bg="#fff">
          <TopBar title="Describe el problema" onBack={onBack} />
          <div style={{ padding:'16px 16px 0', display:'flex', flexDirection:'column', gap:14 }}>
            {/* Type pill */}
            <div style={{ display:'inline-flex',alignItems:'center',gap:8,background:T.orange+'10',borderRadius:10,padding:'9px 12px' }}>
              <Ic.alertCircle s={14} c={T.orange}/><span style={{ fontSize:13,fontWeight:600,color:T.orange }}>{typeLabel}</span>
            </div>

            {/* Product reference */}
            <ProductCard compact />

            {/* Photo upload */}
            <div>
              <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:T.gray400,marginBottom:8 }}>Añade fotos del problema</div>
              <button onClick={()=>setHasPhoto(true)} style={{ width:'100%',height:96,borderRadius:12,border:`1.5px dashed ${hasPhoto?T.green:T.gray200}`,background:hasPhoto?T.green+'08':T.gray50,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:7,cursor:'pointer',fontFamily:'inherit',transition:'all .2s' }}>
                {hasPhoto
                  ? <><Ic.checkCircle s={22} c={T.green}/><span style={{ fontSize:12,fontWeight:700,color:T.green }}>Foto añadida</span></>
                  : <><Ic.camera s={22} c={T.gray400}/><span style={{ fontSize:12,fontWeight:600,color:T.gray400 }}>Toca para añadir foto</span><span style={{ fontSize:11,color:T.gray400 }}>JPG, PNG o HEIC</span></>
                }
              </button>
            </div>

            {/* Description */}
            <div>
              <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:T.gray400,marginBottom:8 }}>Descripción</div>
              <textarea value={desc} onChange={e=>setDesc(e.target.value.slice(0,500))} placeholder="Describe con detalle qué ha ocurrido y el estado en que has recibido el artículo…" rows={4} style={{ width:'100%',padding:'12px 13px',borderRadius:11,border:`1.5px solid ${desc.length>0?T.orange:T.gray200}`,fontSize:14,fontFamily:'inherit',color:T.black,background:T.gray50,resize:'none',lineHeight:1.6,transition:'border-color .15s' }} />
              <div style={{ textAlign:'right',fontSize:11,color:T.gray400,marginTop:3 }}>{desc.length}/500</div>
            </div>

            {/* Info */}
            <div style={{ background:T.gray100,borderRadius:10,padding:'10px 12px',display:'flex',gap:8,alignItems:'flex-start' }}>
              <div style={{ marginTop:1 }}><Ic.lock s={13} c={T.gray400}/></div>
              <p style={{ fontSize:11,color:T.gray500,lineHeight:1.5,margin:0 }}>El pago permanecerá retenido mientras el equipo de soporte revisa tu reclamación. Te responderemos en menos de 48h.</p>
            </div>
          </div>
          <div style={{ padding:'14px 16px' }}>
            <BtnPrimary label="Enviar reclamación" onClick={onSend} style={{ opacity:canSend?1:0.35 }} />
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ SCREEN 8 — RECLAMACIÓN ENVIADA ════════════════════════ */
    function ProblemSentScreen({ onBack }) {
      return (
        <ScreenWrap bg="#fff">
          <TopBar title="Reclamación enviada" />
          <div style={{ padding:'40px 20px 24px',textAlign:'center' }}>
            <div style={{ width:78,height:78,borderRadius:'50%',background:'#FFF3E0',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px' }}>
              <Ic.shield s={34} c={T.orange}/>
            </div>
            <h2 style={{ fontSize:22,fontWeight:800,color:T.black,marginBottom:8 }}>Reclamación enviada</h2>
            <p style={{ fontSize:14,color:T.gray500,lineHeight:1.65,marginBottom:28 }}>Nuestro equipo revisará tu caso y te contactará en menos de 48h. El pago permanece retenido hasta la resolución.</p>
          </div>
          <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:10 }}>
            <Card>
              {[['Nº de reclamación','#REC-1042'],['Pedido','#FX-2847'],['Estado','En revisión por soporte'],['Respuesta estimada','Antes del 6 de junio']].map(([k,v],i,a) => (
                <div key={k} style={{ display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<a.length-1?`1px solid ${T.gray100}`:'none',fontSize:13 }}>
                  <span style={{ color:T.gray500 }}>{k}</span>
                  <span style={{ fontWeight:700,color:k==='Estado'?T.orange:T.black,fontSize:k==='Estado'?12:13 }}>{v}</span>
                </div>
              ))}
            </Card>
            <BtnOutline label="Volver a mis pedidos" onClick={onBack} />
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ SCREEN 9 — VISTA VENDEDOR ═════════════════════════════ */
    const CARRIERS = ['Correos','Correos Express','SEUR','MRW','DHL','GLS'];
    function SellerScreen() {
      const [tracking,setTracking]=React.useState(''), [carrier,setCarrier]=React.useState('Correos Express'), [sent,setSent]=React.useState(false);
      return (
        <ScreenWrap>
          <TopBar title="Mi venta" />
          <div style={{ padding:'14px 14px 0', display:'flex', flexDirection:'column', gap:10 }}>

            {/* Stats */}
            <div style={{ display:'flex',gap:8 }}>
              {[{label:'Valoración',value:'4.9'},{label:'Ventas totales',value:'82'},{label:'Recibirás',value:'€82,79'}].map(s => (
                <div key={s.label} style={{ flex:1,background:'#fff',borderRadius:12,border:`1px solid ${T.gray200}`,padding:'10px 8px',textAlign:'center' }}>
                  <div style={{ fontSize:15,fontWeight:800,color:T.black }}>{s.value}</div>
                  <div style={{ fontSize:10,color:T.gray400,marginTop:2 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Sale item */}
            <Card style={{ display:'flex',gap:12,alignItems:'center' }}>
              <div style={{ width:52,height:52,borderRadius:10,background:T.gray100,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center' }}><Ic.phone s={22} c={T.gray400}/></div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13,fontWeight:700,color:T.black }}>Pantalla LCD iPhone 13 Pro</div>
                <div style={{ fontSize:12,color:T.gray400,marginTop:2 }}>Comprador: @maria_reparaciones</div>
                <div style={{ marginTop:6 }}><Pill color={sent?T.green:T.orange}>{sent?'Enviado':'Pendiente de envío'}</Pill></div>
              </div>
            </Card>

            {/* Payment status */}
            <Card>
              <div style={{ fontSize:13,fontWeight:700,color:T.black,marginBottom:10 }}>Estado del pago</div>
              <Row label="Precio de venta" value="€89,99" />
              <Row label="Comisión Fixter (8%)" value="−€7,20" accent />
              <div style={{ display:'flex',justifyContent:'space-between',paddingTop:10 }}>
                <span style={{ fontWeight:700,fontSize:15 }}>Recibirás</span>
                <span style={{ fontWeight:800,fontSize:17 }}>€82,79</span>
              </div>
              <div style={{ marginTop:12,padding:'10px 12px',borderRadius:10,background:T.orange+'10',display:'flex',gap:8,alignItems:'center' }}>
                <Ic.shield s={14} c={T.orange}/>
                <span style={{ fontSize:12,color:'#7A3000',fontWeight:600,lineHeight:1.4 }}>
                  {sent?'Esperando que el comprador confirme la recepción':'Importe retenido · Se libera cuando el comprador confirme la recepción'}
                </span>
              </div>
            </Card>

            {/* Tracking input or confirmation */}
            {!sent ? (
              <Card>
                <div style={{ fontSize:13,fontWeight:700,color:T.black,marginBottom:6 }}>Añadir número de seguimiento</div>
                <p style={{ fontSize:12,color:T.gray500,marginBottom:14,lineHeight:1.5 }}>Introduce el número de seguimiento una vez hayas enviado el paquete. El comprador podrá rastrearlo en tiempo real.</p>
                <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:T.gray400,marginBottom:8 }}>Transportista</div>
                <div style={{ display:'flex',gap:6,flexWrap:'wrap',marginBottom:14 }}>
                  {CARRIERS.map(c => (
                    <button key={c} onClick={()=>setCarrier(c)} style={{ padding:'6px 12px',borderRadius:20,border:`1.5px solid ${carrier===c?T.orange:T.gray200}`,background:carrier===c?T.orange+'10':'#fff',fontSize:12,fontWeight:carrier===c?700:500,color:carrier===c?T.orange:T.gray500,cursor:'pointer',fontFamily:'inherit',transition:'all .15s' }}>{c}</button>
                  ))}
                </div>
                <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:T.gray400,marginBottom:8 }}>Número de seguimiento</div>
                <input value={tracking} onChange={e=>setTracking(e.target.value.toUpperCase())} placeholder="Ej. ES123456789MX" style={{ width:'100%',padding:'12px 13px',borderRadius:11,border:`1.5px solid ${tracking.length>0?T.orange:T.gray200}`,fontSize:14,fontFamily:'monospace',color:T.black,background:T.gray50,letterSpacing:1,marginBottom:14,transition:'border-color .15s' }} />
                <BtnPrimary label="Confirmar envío" onClick={()=>tracking.length>5&&setSent(true)} style={{ opacity:tracking.length>5?1:0.35 }} />
              </Card>
            ) : (
              <Card>
                <div style={{ fontSize:13,fontWeight:700,color:T.black,marginBottom:12 }}>Envío registrado</div>
                <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16 }}>
                  <div>
                    <div style={{ fontSize:16,fontWeight:800,fontFamily:'monospace',letterSpacing:1.5,color:T.black }}>{tracking}</div>
                    <div style={{ fontSize:12,color:T.gray400,marginTop:3 }}>{carrier}</div>
                  </div>
                  <Pill color={T.green}>Enviado</Pill>
                </div>
                {/* Mini timeline */}
                {[
                  {done:true,  label:'Número de tracking enviado al comprador'},
                  {active:true,label:'Esperando confirmación de recepción'},
                  {done:false, label:'Pago liberado en tu cuenta'},
                ].map((s,i,a) => (
                  <div key={i} style={{ display:'flex',gap:10,alignItems:'flex-start' }}>
                    <div style={{ display:'flex',flexDirection:'column',alignItems:'center',width:20,flexShrink:0 }}>
                      <div style={{ width:20,height:20,borderRadius:'50%',background:s.done?T.black:s.active?T.orange:T.gray200,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>
                        {s.done && <span style={{ fontSize:9,color:'#fff',fontWeight:900 }}>✓</span>}
                        {s.active && <div style={{ width:8,height:8,borderRadius:'50%',background:'#fff' }} />}
                      </div>
                      {i<a.length-1 && <div style={{ width:2,minHeight:18,flex:1,margin:'2px 0',background:s.done?T.black:T.gray200 }} />}
                    </div>
                    <div style={{ paddingBottom:i<a.length-1?12:0 }}>
                      <span style={{ fontSize:13,fontWeight:s.active?700:600,color:s.active?T.orange:s.done?T.black:T.gray400 }}>{s.label}</span>
                    </div>
                  </div>
                ))}
              </Card>
            )}
          </div>
        </ScreenWrap>
      );
    }

    /* ═══ APP SHELL ══════════════════════════════════════════════ */
    const BUYER_SCREENS = [
      {id:'checkout',     label:'Checkout'},
      {id:'success',      label:'Confirmado'},
      {id:'tracking',     label:'Seguimiento'},
      {id:'receive',      label:'Recepción'},
      {id:'failed',       label:'Fallido'},
    ];
    const CLAIM_SCREENS = [
      {id:'problem-type', label:'Problema'},
      {id:'problem-form', label:'Formulario'},
      {id:'problem-sent', label:'Enviada'},
    ];
    const SELLER_SCREENS = [
      {id:'seller',       label:'Vendedor'},
    ];
    const ALL_SCREENS = [...BUYER_SCREENS,...CLAIM_SCREENS,...SELLER_SCREENS];

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "screen": "seller"
    }/*EDITMODE-END*/;

    function App() {
      const [t,setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [problemType,setProblemType] = React.useState('not-received');
      const go = id => setTweak('screen',id);
      const screen = t.screen||'checkout';

      const renderScreen = () => {
        switch(screen) {
          case 'checkout':     return <CheckoutScreen onSuccess={()=>go('success')} onFail={()=>go('failed')} />;
          case 'success':      return <SuccessScreen  onTrack={()=>go('tracking')} />;
          case 'tracking':     return <TrackingScreen onReceive={()=>go('receive')} onBack={()=>go('success')} />;
          case 'receive':      return <ReceiveScreen  onConfirm={()=>go('success')} onBack={()=>go('tracking')} onProblem={()=>go('problem-type')} />;
          case 'failed':       return <FailedScreen   onRetry={()=>go('checkout')} onBack={()=>go('checkout')} />;
          case 'problem-type': return <ProblemTypeScreen onNext={t=>{setProblemType(t);go('problem-form');}} onBack={()=>go('receive')} />;
          case 'problem-form': return <ProblemFormScreen problemType={problemType} onSend={()=>go('problem-sent')} onBack={()=>go('problem-type')} />;
          case 'problem-sent': return <ProblemSentScreen onBack={()=>go('receive')} />;
          case 'seller':       return <SellerScreen />;
          default:             return <CheckoutScreen onSuccess={()=>go('success')} onFail={()=>go('failed')} />;
        }
      };

      const NavGroup = ({screens,label}) => (
        <div style={{ display:'flex',alignItems:'center',gap:3 }}>
          <span style={{ fontSize:9,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'rgba(255,255,255,0.25)',marginRight:2,whiteSpace:'nowrap' }}>{label}</span>
          {screens.map(s => (
            <button key={s.id} onClick={()=>go(s.id)} style={{ background:screen===s.id?T.orange:'transparent',color:screen===s.id?'#fff':'rgba(255,255,255,0.4)',border:'none',borderRadius:22,padding:'5px 11px',fontSize:11,fontWeight:700,fontFamily:'inherit',whiteSpace:'nowrap',transition:'all .15s',cursor:'pointer' }}>{s.label}</button>
          ))}
        </div>
      );

      return (
        <div style={{ fontFamily:"'Plus Jakarta Sans', sans-serif" }}>
          {/* Nav pills — two rows */}
          <div style={{ position:'fixed',top:14,left:'50%',transform:'translateX(-50%)',zIndex:9999,display:'flex',flexDirection:'column',gap:4,background:'rgba(18,18,18,0.92)',backdropFilter:'blur(12px)',borderRadius:18,padding:'8px 10px',boxShadow:'0 4px 24px rgba(0,0,0,0.45)' }}>
            <NavGroup screens={BUYER_SCREENS} label="Comprador" />
            <div style={{ height:1,background:'rgba(255,255,255,0.08)',margin:'0 2px' }} />
            <div style={{ display:'flex',alignItems:'center',gap:6 }}>
              <NavGroup screens={CLAIM_SCREENS} label="Reclamación" />
              <div style={{ width:1,height:14,background:'rgba(255,255,255,0.12)' }} />
              <NavGroup screens={SELLER_SCREENS} label="Vendedor" />
            </div>
          </div>

          <IOSDevice>{renderScreen()}</IOSDevice>

          <TweaksPanel>
            <TweakSection label="Pantalla" />
            <TweakSelect label="Ir a pantalla" value={screen} options={ALL_SCREENS.map(s=>s.id)} onChange={id=>go(id)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
